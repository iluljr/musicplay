services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      network: host
    container_name: musicplay-backend
    ports:
      - "127.0.0.1:3001:3001"
    expose:
      - "3001"
    volumes:
      - ./uploads:/app/backend/uploads
      - ./backend/data:/app/backend/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      network: host
      args:
        VITE_API_BASE_URL: http://localhost:3001
        VITE_WS_URL: ws://localhost:3001/ws/player
    container_name: musicplay-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS: live.digitalmfa.com
    ports:
      - "127.0.0.1:4173:4173"
    expose:
      - "4173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-bookworm
    container_name: musicplay-nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/templates:/etc/musicplay/templates:ro
      - ./infra/nginx/start-nginx.sh:/start-nginx.sh:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    command: ["/bin/sh", "/start-nginx.sh"]
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: musicplay-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
